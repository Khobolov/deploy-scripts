log:
  level: ERROR

api:
  insecure: true
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: traefik-public
    watch: true

tls:
  certificates:
    - certFile: "/certs/podmox.crt"
      keyFile: "/certs/podmox.key"
